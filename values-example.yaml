# Example values file for ClearlyDefined Helm Chart
# Copy this file to my-values.yaml and fill in your actual values

# Required: GitHub tokens
secrets:
  # Get a GitHub Personal Access Token from: https://github.com/settings/tokens
  # Minimal permissions required
  curationGithubToken: "ghp_your_token_here"
  crawlerGithubToken: "ghp_your_token_here"
  
  # Optional: GitLab token (can be a random string if not using GitLab)
  gitlabToken: "random-string-or-your-gitlab-token"
  
  # Optional: Webhook token for GitHub webhooks
  # crawlerWebhookToken: "your-webhook-secret"
  
  # Optional: Azure Blob Storage (for production deployments)
  # crawlerAzblobConnectionString: "DefaultEndpointsProtocol=https;AccountName=..."
  
  # Optional: Application Insights (for monitoring)
  # crawlerInsightsConnectionString: "InstrumentationKey=..."

# Optional: Customize image tags
# images:
#   service:
#     tag: "v1.0.0"
#   crawler:
#     tag: "v1.0.0"

# IMPORTANT: Configure your own curated data repository
# config:
#   curation:
#     github:
#       owner: "your-github-username"
#       repo: "your-curated-data-repo"
#       branch: "main"

# Optional: Enable MongoDB seed for development/testing with sample data
# mongoSeed:
#   enabled: true  # Default is false - only enable for dev/testing

# Optional: Enable Traefik ingress for external access
# Option 1: Traefik with Let's Encrypt (automatic HTTPS)
# useTraefikLe: true
# leHost: "clearlydefined.example.com"
# projectProtocol: "https"  # Enables HTTP to HTTPS redirect
# traefik_crd_api_version: "traefik.containo.us/v1alpha1"

# Option 2: Traefik behind a load balancer (HTTP only)
# traefikBehindLb: true
# leHost: "clearlydefined.example.com"
# traefik_crd_api_version: "traefik.containo.us/v1alpha1"

# Optional: Adjust resource limits
# service:
#   resources:
#     requests:
#       cpu: 1000m
#       memory: 1Gi
#     limits:
#       cpu: 2000m
#       memory: 2Gi

# Optional: Configure storage
# global:
#   storageClass: "standard"

# mongodb:
#   persistence:
#     size: 20Gi

# harvestedData:
#   persistence:
#     size: 50Gi
#     # Use ReadWriteMany if you have compatible storage (NFS, Azure Files, EFS)
#     # accessMode: ReadWriteMany
#     # storageClass: "nfs"

# Optional: Disable persistence for development
# mongodb:
#   persistence:
#     enabled: false
# redis:
#   persistence:
#     enabled: false
# harvestedData:
#   persistence:
#     enabled: false

# Optional: Enable debug mode
# service:
#   debug:
#     enabled: true
# crawler:
#   debug:
#     enabled: true
