# Default values for clearlydefined
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  storageClass: ""

# Image configuration
images:
  service:
    repository: registry.relizahub.com/83d27192-7d06-4d01-a5d6-de4839926da2-public/clearlydefined-service
    tag: latest
    pullPolicy: Always
  crawler:
    repository: registry.relizahub.com/83d27192-7d06-4d01-a5d6-de4839926da2-public/clearlydefined-crawler
    tag: latest
    pullPolicy: Always
  mongodb:
    repository: mongo
    tag: "5.0.6"
    pullPolicy: IfNotPresent
  mongoSeed:
    repository: clearlydefined/docker_dev_env_experiment_clearlydefined_mongo_seed
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service component configuration
service:
  enabled: true
  replicaCount: 1
  
  service:
    type: ClusterIP
    port: 4000
    targetPort: 4000
  
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # Debug configuration
  debug:
    enabled: false
    port: 9230

# Crawler component configuration
crawler:
  enabled: true
  replicaCount: 1
  
  service:
    type: ClusterIP
    port: 5000
    targetPort: 5000
  
  resources:
    requests:
      cpu: 750m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # Debug configuration
  debug:
    enabled: false
    port: 9229

# MongoDB configuration
mongodb:
  enabled: true
  
  service:
    type: ClusterIP
    port: 27017
  
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    # storageClass: ""
  
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

# MongoDB Seed Job configuration
# Note: This is for development/testing with sample data only.
# If using your own curated data repository, set enabled: false
mongoSeed:
  enabled: false
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Redis configuration
redis:
  enabled: true
  
  service:
    type: ClusterIP
    port: 6379
  
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
    # storageClass: ""
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Shared harvested data volume
# Note: Using ReadWriteOnce - service and crawler must be scheduled on the same node
harvestedData:
  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce
    # storageClass: ""

# Environment configuration
# Non-sensitive configuration values
config:
  # Curation GitHub Info
  curation:
    github:
      branch: "master"
      owner: "clearlydefined"
      repo: "curated-data-dev"
    provider: "github"
    store:
      provider: "mongo"
      connectionString: "mongodb://clearlydefined-mongodb:27017"
      dbName: "clearlydefined"
      collectionName: "curations"
  
  # Definition Store Info
  definition:
    store:
      provider: "mongo"
      connectionString: "mongodb://clearlydefined-mongodb:27017"
      dbName: "clearlydefined"
      collectionName: "definitions-paged"
  
  # Harvest Store Info
  harvest:
    store:
      provider: "file"
  
  # File Store Location
  fileStore:
    location: "/tmp/harvested_data"
  
  # Crawler Info
  crawler:
    apiUrl: "http://clearlydefined-crawler:5000"
    deadletterProvider: "cd(file)"
    name: "cdcrawlerlocal"
    queueProvider: "memory"
    storeProvider: "cd(file)"
    # Optional: Set crawler host and webhook URL if needed
    host: ""
    webhookUrl: ""
    queuePrefix: ""
    azblob:
      containerName: ""

# Secrets configuration
# These should be provided via --set flags or a separate secrets file
secrets:
  # GitHub tokens (required)
  curationGithubToken: ""
  crawlerGithubToken: ""
  
  # GitLab token (optional - can be random string if not using GitLab)
  gitlabToken: ""
  
  # Crawler webhook token (optional)
  crawlerWebhookToken: ""
  
  # Azure Blob Storage (optional)
  crawlerAzblobConnectionString: ""
  
  # Application Insights (optional)
  crawlerInsightsConnectionString: ""

# Traefik Ingress configuration
# Enable one of: useTraefikLe (with Let's Encrypt) or traefikBehindLb (behind load balancer)
useTraefikLe: false
traefikBehindLb: false

# Traefik configuration
traefik_crd_api_version: "traefik.containo.us/v1alpha1"
leHost: "clearlydefined.local"
projectProtocol: "https"  # Set to "https" to enable HTTP to HTTPS redirect

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
