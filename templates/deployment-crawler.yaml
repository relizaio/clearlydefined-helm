{{- if .Values.crawler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clearlydefined.fullname" . }}-crawler
  labels:
    {{- include "clearlydefined.crawler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.crawler.replicaCount }}
  selector:
    matchLabels:
      {{- include "clearlydefined.crawler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "clearlydefined.crawler.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clearlydefined.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: crawler
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.images.crawler.repository }}:{{ .Values.images.crawler.tag }}"
          imagePullPolicy: {{ .Values.images.crawler.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.crawler.service.targetPort }}
              protocol: TCP
            {{- if .Values.crawler.debug.enabled }}
            - name: debug
              containerPort: {{ .Values.crawler.debug.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: CRAWLER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "clearlydefined.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- if .Values.crawler.debug.enabled }}
          command:
            - "node"
            - "--inspect=0.0.0.0:{{ .Values.crawler.debug.port }}"
            - "./index.js"
          {{- end }}
          volumeMounts:
            - name: harvested-data
              mountPath: {{ .Values.config.fileStore.location }}
          resources:
            {{- toYaml .Values.crawler.resources | nindent 12 }}
      volumes:
        - name: harvested-data
          {{- if .Values.harvestedData.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "clearlydefined.fullname" . }}-harvested-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.crawler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.crawler.affinity }}
        {{- toYaml .Values.crawler.affinity | nindent 8 }}
        {{- else }}
        {{- if and .Values.harvestedData.persistence.enabled (eq .Values.harvestedData.persistence.accessMode "ReadWriteOnce") }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - service
              topologyKey: kubernetes.io/hostname
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.crawler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
