{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clearlydefined.fullname" . }}-service
  labels:
    {{- include "clearlydefined.service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.service.type }}
  ports:
    - port: {{ .Values.service.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.debug.enabled }}
    - port: {{ .Values.service.debug.port }}
      targetPort: debug
      protocol: TCP
      name: debug
    {{- end }}
  selector:
    {{- include "clearlydefined.service.selectorLabels" . | nindent 4 }}
{{- end }}
