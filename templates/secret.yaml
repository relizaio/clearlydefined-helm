{{/*
  This chart expects an existing Kubernetes secret referenced by .Values.existingSecret.
  The secret must be created before installing the chart.

  Required keys:
    - CURATION_GITHUB_TOKEN  (GitHub PAT with read/write access to curated data repo)
    - CRAWLER_GITHUB_TOKEN   (GitHub PAT with read access, can be same as above)

  Optional keys:
    - GITLAB_TOKEN                       (GitLab token, or random string if not using GitLab)
    - CRAWLER_WEBHOOK_TOKEN              (webhook authentication token)
    - CRAWLER_AZBLOB_CONNECTION_STRING   (Azure Blob Storage connection string)
    - CRAWLER_INSIGHTS_CONNECTION_STRING (Application Insights connection string)

  See INSTALL.md for instructions on creating the secret.
*/}}
