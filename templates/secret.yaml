apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clearlydefined.fullname" . }}-secrets
  labels:
    {{- include "clearlydefined.labels" . | nindent 4 }}
type: Opaque
stringData:
  # GitHub tokens (required)
  CURATION_GITHUB_TOKEN: {{ .Values.secrets.curationGithubToken | quote }}
  CRAWLER_GITHUB_TOKEN: {{ .Values.secrets.crawlerGithubToken | quote }}
  
  # GitLab token (optional)
  {{- if .Values.secrets.gitlabToken }}
  GITLAB_TOKEN: {{ .Values.secrets.gitlabToken | quote }}
  {{- end }}
  
  # Crawler webhook token (optional)
  {{- if .Values.secrets.crawlerWebhookToken }}
  CRAWLER_WEBHOOK_TOKEN: {{ .Values.secrets.crawlerWebhookToken | quote }}
  {{- end }}
  
  # Azure Blob Storage (optional)
  {{- if .Values.secrets.crawlerAzblobConnectionString }}
  CRAWLER_AZBLOB_CONNECTION_STRING: {{ .Values.secrets.crawlerAzblobConnectionString | quote }}
  {{- end }}
  
  # Application Insights (optional)
  {{- if .Values.secrets.crawlerInsightsConnectionString }}
  CRAWLER_INSIGHTS_CONNECTION_STRING: {{ .Values.secrets.crawlerInsightsConnectionString | quote }}
  {{- end }}
